<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Worker YT Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        #player-area { width: 100%; max-width: 640px; aspect-ratio: 16/9; background: #000; margin-top: 20px; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; }
        .controls { margin-bottom: 20px; }
        input { padding: 10px; border-radius: 4px; border: none; width: 250px; }
        button { padding: 10px 20px; border-radius: 4px; border: none; background: #ff0000; color: white; cursor: pointer; font-weight: bold; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .thumb { cursor: pointer; transition: transform 0.2s; }
        .thumb:hover { transform: scale(1.05); }
        .thumb img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="keyword" placeholder="動画を検索...">
        <button onclick="search()">検索実行</button>
    </div>

    <div id="player-area">
        <div id="youtube-placeholder">動画を選択してください</div>
    </div>

    <div id="results"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const WORKER_URL = "https://calm-star-b765.a6068376.workers.dev/"; // 例: https://project.name.workers.dev/

        // 検索関数
        async function search() {
            const q = document.getElementById('keyword').value;
            const res = await fetch(`${WORKER_URL}?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'thumb';
                div.innerHTML = `
                    <img src="${item.snippet.thumbnails.medium.url}">
                    <p style="font-size:12px;">${item.snippet.title}</p>
                `;
                div.onclick = () => playVideo(item.id.videoId);
                resultsDiv.appendChild(div);
            });
        }

        // 動画再生関数（ここでiframeを動的に生成する）
        function playVideo(videoId) {
            // すでにプレイヤーがある場合は動画を入れ替えるだけ
            if (player && player.loadVideoById) {
                player.loadVideoById(videoId);
            } else {
                // 初めて動画を流すときに、placeholderのdivをプレイヤーに置き換える
                player = new YT.Player('youtube-placeholder', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'modestbranding': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': (event) => event.target.playVideo()
                    }
                });
            }
        }
    </script>
</body>
</html>
